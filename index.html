<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smelting Minerals - 118 Елементів</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'VT323', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        h1 {
            text-align: center;
            font-size: 48px;
            margin-bottom: 5px;
            color: #FFD700;
            text-shadow: 2px 2px 0 #000;
        }
        .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 20px; }

        .mixer-box {
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .metal-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .metal-btn {
            padding: 15px 10px;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .metal-btn:hover { transform: translateY(-3px); border-color: #777; }
        .metal-btn .sym { font-size: 28px; font-weight: bold; display: block; }
        .metal-btn .lbl { font-size: 14px; color: #aaa; }

        .slots {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
        }
        .slot {
            width: 120px;
            height: 120px;
            background: #0a0a0a;
            border: 2px dashed #555;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .slot.filled { border-style: solid; border-color: #FFD700; box-shadow: 0 0 10px rgba(255,215,0,0.2); }
        .slot .sym { font-size: 40px; font-weight: bold; }
        .slot .lbl { font-size: 16px; color: #888; margin-top: 5px; }
        .plus { font-size: 30px; color: #555; }

        .mix-btn {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            font-family: inherit;
            background: linear-gradient(to right, #4CAF50, #45a049);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .mix-btn:hover { filter: brightness(1.1); }
        .mix-btn:active { transform: scale(0.98); }

        .result-box {
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #333;
            border-radius: 12px;
            padding: 25px;
            text-align: center;
            display: none;
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .result-box.show { display: block; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .result-card {
            width: 180px;
            height: 180px;
            margin: 15px auto;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 3px 3px 6px rgba(255,255,255,0.2), inset -3px -3px 6px rgba(0,0,0,0.5);
            border: 3px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .result-card .sym { font-size: 56px; font-weight: bold; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .result-card .lbl { font-size: 18px; margin-top: 5px; opacity: 0.9; }
        .result-card .discovery {
            position: absolute;
            top: -10px;
            right: -10px;
            background: #FFD700;
            color: #000;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            animation: pulse 1s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        .reset-btn {
            margin-top: 15px;
            padding: 10px 25px;
            font-size: 20px;
            font-family: inherit;
            background: #d32f2f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .reset-btn:hover { background: #b71c1c; }

        .info {
            margin-top: 25px;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-left: 4px solid #FFD700;
            border-radius: 4px;
            font-size: 16px;
            line-height: 1.5;
            color: #bbb;
        }

        .discovery-log {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,215,0,0.1);
            border: 2px solid #FFD700;
            border-radius: 8px;
            display: none;
        }
        .discovery-log.show { display: block; }
        .discovery-log h3 { color: #FFD700; margin-bottom: 10px; }
        .discovery-log p { color: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚗️ Smelting Minerals</h1>
        <p class="subtitle">Відкрий усі 118 елементів!</p>

        <div class="mixer-box">
            <div style="margin-bottom: 15px; text-align: center; color: #888; font-size: 18px;">
                Обери два елементи:
            </div>
            <div class="metal-grid" id="elementGrid"></div>

            <div class="slots">
                <div class="slot" id="s1" onclick="clr(1)"><span class="sym">?</span><span class="lbl">Слот 1</span></div>
                <div class="plus">+</div>
                <div class="slot" id="s2" onclick="clr(2)"><span class="sym">?</span><span class="lbl">Слот 2</span></div>
            </div>

            <button class="mix-btn" onclick="smelt()">🔥 СПЛАВИТИ</button>
        </div>

        <div class="result-box" id="resBox">
            <div style="font-size:20px; color:#888">Результат:</div>
            <div class="result-card" id="resCard">
                <span class="sym" id="resSym">??</span>
                <span class="lbl" id="resLbl">---</span>
            </div>
            <button class="reset-btn" onclick="reset()">🔄 Скинути</button>
        </div>

        <div class="discovery-log" id="discLog">
            <h3>🎉 ВІДКРИТТЯ!</h3>
            <p id="discText"></p>
        </div>

        <div class="info">
            📜 <b>Правило:</b> 1-ша літера 2-го елемента (Велика) + 2-га літера 1-го (маленька).<br>
            🔬 Якщо створиш справжній хімічний елемент — отримаєш відкриття!
        </div>
    </div>

    <script>
        // БАЗА ВСІХ 118 ЕЛЕМЕНТІВ
        const ELEMENTS = {
            H:  { n: "Гідроген", c: "#FFB6C1" }, He: { n: "Гелій", c: "#FFD700" },
            Li: { n: "Літій", c: "#FF69B4" }, Be: { n: "Берилій", c: "#00FF00" },
            B:  { n: "Бор", c: "#FFA500" }, C: { n: "Карбон", c: "#696969" },
            N:  { n: "Нітроген", c: "#0000FF" }, O: { n: "Оксиген", c: "#FF0000" },
            F:  { n: "Фтор", c: "#FFFF00" }, Ne: { n: "Неон", c: "#FFA500" },
            Na: { n: "Натрій", c: "#FF69B4" }, Mg: { n: "Магній", c: "#00FF00" },
            Al: { n: "Алюміній", c: "#C0C0C0" }, Si: { n: "Силіцій", c: "#8B4513" },
            P:  { n: "Фосфор", c: "#FF00FF" }, S: { n: "Сульфур", c: "#FFFF00" },
            Cl: { n: "Хлор", c: "#00FF00" }, Ar: { n: "Аргон", c: "#800080" },
            K:  { n: "Калій", c: "#FF69B4" }, Ca: { n: "Кальцій", c: "#FFB6C1" },
            Sc: { n: "Скандій", c: "#FFB6C1" }, Ti: { n: "Титан", c: "#C0C0C0" },
            V:  { n: "Ванадій", c: "#C0C0C0" }, Cr: { n: "Хром", c: "#C0C0C0" },
            Mn: { n: "Марганець", c: "#C0C0C0" }, Fe: { n: "Залізо", c: "#708090" },
            Co: { n: "Кобальт", c: "#C0C0C0" }, Ni: { n: "Нікель", c: "#C0C0C0" },
            Cu: { n: "Мідь", c: "#B87333" }, Zn: { n: "Цинк", c: "#C0C0C0" },
            Ga: { n: "Галій", c: "#C0C0C0" }, Ge: { n: "Германій", c: "#8B4513" },
            As: { n: "Арсен", c: "#8B4513" }, Se: { n: "Селен", c: "#FFA500" },
            Br: { n: "Бром", c: "#FF0000" }, Kr: { n: "Криптон", c: "#800080" },
            Rb: { n: "Рубідій", c: "#FF69B4" }, Sr: { n: "Стронцій", c: "#FF0000" },
            Y:  { n: "Ітрій", c: "#FFB6C1" }, Zr: { n: "Цирконій", c: "#C0C0C0" },
            Nb: { n: "Ніобій", c: "#C0C0C0" }, Mo: { n: "Молібден", c: "#C0C0C0" },
            Tc: { n: "Технецій", c: "#C0C0C0" }, Ru: { n: "Рутеній", c: "#C0C0C0" },
            Rh: { n: "Родій", c: "#C0C0C0" }, Pd: { n: "Паладій", c: "#C0C0C0" },
            Ag: { n: "Срібло", c: "#C0C0C0" }, Cd: { n: "Кадмій", c: "#C0C0C0" },
            In: { n: "Індій", c: "#C0C0C0" }, Sn: { n: "Станум", c: "#C0C0C0" },
            Sb: { n: "Стибій", c: "#C0C0C0" }, Te: { n: "Телур", c: "#C0C0C0" },
            I:  { n: "Йод", c: "#800080" }, Xe: { n: "Ксенон", c: "#800080" },
            Cs: { n: "Цезій", c: "#FF69B4" }, Ba: { n: "Барій", c: "#00FF00" },
            La: { n: "Лантан", c: "#FFB6C1" }, Ce: { n: "Церій", c: "#FFB6C1" },
            Pr: { n: "Празеодим", c: "#FFB6C1" }, Nd: { n: "Неодим", c: "#FFB6C1" },
            Pm: { n: "Прометій", c: "#FFB6C1" }, Sm: { n: "Самарій", c: "#FFB6C1" },
            Eu: { n: "Європій", c: "#FFB6C1" }, Gd: { n: "Гадоліній", c: "#FFB6C1" },
            Tb: { n: "Тербій", c: "#FFB6C1" }, Dy: { n: "Диспрозій", c: "#FFB6C1" },
            Ho: { n: "Гольмій", c: "#FFB6C1" }, Er: { n: "Ербій", c: "#FFB6C1" },
            Tm: { n: "Тулій", c: "#FFB6C1" }, Yb: { n: "Ітербій", c: "#FFB6C1" },
            Lu: { n: "Лютецій", c: "#FFB6C1" }, Hf: { n: "Гафній", c: "#C0C0C0" },
            Ta: { n: "Тантал", c: "#C0C0C0" }, W: { n: "Вольфрам", c: "#C0C0C0" },
            Re: { n: "Реній", c: "#C0C0C0" }, Os: { n: "Осмій", c: "#C0C0C0" },
            Ir: { n: "Іридій", c: "#C0C0C0" }, Pt: { n: "Платина", c: "#E5E4E2" },
            Au: { n: "Золото", c: "#FFD700" }, Hg: { n: "Меркурій", c: "#C0C0C0" },
            Tl: { n: "Талій", c: "#C0C0C0" }, Pb: { n: "Плюмбум", c: "#C0C0C0" },
            Bi: { n: "Бісмут", c: "#C0C0C0" }, Po: { n: "Полоній", c: "#C0C0C0" },
            At: { n: "Астат", c: "#8B4513" }, Rn: { n: "Радон", c: "#800080" },
            Fr: { n: "Францій", c: "#FF69B4" }, Ra: { n: "Радій", c: "#FF0000" },
            Ac: { n: "Актиній", c: "#FF0000" }, Th: { n: "Торій", c: "#00FF00" },
            Pa: { n: "Протактиній", c: "#00FF00" }, U: { n: "Уран", c: "#00FF00" },
            Np: { n: "Нептуній", c: "#0000FF" }, Pu: { n: "Плутоній", c: "#0000FF" },
            Am: { n: "Америцій", c: "#FF00FF" }, Cm: { n: "Кюрій", c: "#FF00FF" },
            Bk: { n: "Берклій", c: "#FF00FF" }, Cf: { n: "Каліфорній", c: "#FF00FF" },
            Es: { n: "Ейнштейній", c: "#FF00FF" }, Fm: { n: "Фермій", c: "#FF00FF" },
            Md: { n: "Менделевій", c: "#FF00FF" }, No: { n: "Нобелій", c: "#FF00FF" },
            Lr: { n: "Лоуренсій", c: "#FF00FF" }, Rf: { n: "Резерфордій", c: "#C0C0C0" },
            Db: { n: "Дубній", c: "#C0C0C0" }, Sg: { n: "Сиборгій", c: "#C0C0C0" },
            Bh: { n: "Борій", c: "#C0C0C0" }, Hs: { n: "Хассій", c: "#C0C0C0" },
            Mt: { n: "Майтнерій", c: "#C0C0C0" }, Ds: { n: "Дармштадтій", c: "#C0C0C0" },
            Rg: { n: "Рентгеній", c: "#C0C0C0" }, Cn: { n: "Коперніцій", c: "#C0C0C0" },
            Nh: { n: "Ніхоній", c: "#C0C0C0" }, Fl: { n: "Флеровій", c: "#C0C0C0" },
            Mc: { n: "Московій", c: "#C0C0C0" }, Lv: { n: "Ліверморій", c: "#C0C0C0" },
            Ts: { n: "Теннессин", c: "#8B4513" }, Og: { n: "Оганесон", c: "#800080" }
        };

        let slots = [null, null];
        let discoveries = new Set();

        // Ініціалізація сітки
        function initGrid() {
            const grid = document.getElementById('elementGrid');
            const baseElements = ['H', 'He', 'Li', 'Be', 'B', 'C', 'N', 'O', 'F', 'Ne', 
                                  'Na', 'Mg', 'Al', 'Si', 'P', 'S', 'Cl', 'Ar', 'K', 'Ca',
                                  'Fe', 'Cu', 'Zn', 'Ag', 'Au', 'Pb', 'Sn', 'Hg', 'U', 'Pu'];
            
            grid.innerHTML = baseElements.map(sym => `
                <div class="metal-btn" onclick="pick('${sym}')" style="border-color:${ELEMENTS[sym].c}">
                    <span class="sym" style="color:${ELEMENTS[sym].c}">${sym}</span>
                    <span class="lbl">${ELEMENTS[sym].n}</span>
                </div>
            `).join('');
        }

        function pick(key) {
            if (!slots[0]) { slots[0] = {s: key, ...ELEMENTS[key]}; renderSlot(0); }
            else if (!slots[1]) { slots[1] = {s: key, ...ELEMENTS[key]}; renderSlot(1); }
            else { slots[1] = {s: key, ...ELEMENTS[key]}; renderSlot(1); }
        }

        function renderSlot(i) {
            const el = document.getElementById(`s${i+1}`);
            const m = slots[i];
            if (m) {
                el.querySelector('.sym').textContent = m.s;
                el.querySelector('.sym').style.color = m.c;
                el.querySelector('.lbl').textContent = m.n;
                el.classList.add('filled');
            }
        }

        function clr(i) {
            slots[i-1] = null;
            const el = document.getElementById(`s${i}`);
            el.querySelector('.sym').textContent = '?';
            el.querySelector('.sym').style.color = '#555';
            el.querySelector('.lbl').textContent = `Слот ${i}`;
            el.classList.remove('filled');
            document.getElementById('resBox').classList.remove('show');
            document.getElementById('discLog').classList.remove('show');
        }

        function genName(m1, m2) {
            let c1 = m2.s[0].toUpperCase();
            let c2 = m1.s.length > 1 ? m1.s[1].toLowerCase() : m1.s[0].toLowerCase();
            let name = c1 + c2;

            const bad = (n) => n === m1.s || n === m2.s || (n.length === 2 && n[0].toLowerCase() === n[1].toLowerCase());

            if (bad(name)) {
                c2 = m1.s[0].toLowerCase();
                name = c1 + c2;
                
                if (bad(name) && m2.s.length > 1) {
                    c1 = m2.s[1].toUpperCase();
                    name = c1 + c2;
                }
            }
            return name;
        }

        function mixCol(c1, c2) {
            const toRgb = h => {
                const b = parseInt(h.replace('#',''), 16);
                return [(b>>16)&255, (b>>8)&255, b&255];
            };
            const [r1,g1,b1] = toRgb(c1);
            const [r2,g2,b2] = toRgb(c2);
            const avg = (a, b) => Math.round((a+b)/2);
            const toHex = v => v.toString(16).padStart(2,'0');
            return `#${toHex(avg(r1,r2))}${toHex(avg(g1,g2))}${toHex(avg(b1,b2))}`.toUpperCase();
        }

        function smelt() {
            if (!slots[0] || !slots[1]) return alert('Заповни обидва слоти!');
            
            const alloyName = genName(slots[0], slots[1]);
            const alloyColor = mixCol(slots[0].c, slots[1].c);
            
            // Перевірка на відкриття
            const isDiscovery = ELEMENTS[alloyName] && !discoveries.has(alloyName);
            if (isDiscovery) discoveries.add(alloyName);

            const card = document.getElementById('resCard');
            card.style.background = `linear-gradient(145deg, ${alloyColor}, #00000040)`;
            card.style.borderColor = alloyColor;
            
            document.getElementById('resSym').textContent = alloyName;
            document.getElementById('resSym').style.color = '#fff';
            document.getElementById('resLbl').textContent = `${slots[0].n} + ${slots[1].n}`;
            
            // Видалити старі відмітки
            const oldBadge = card.querySelector('.discovery');
            if (oldBadge) oldBadge.remove();
            
            if (isDiscovery) {
                const badge = document.createElement('div');
                badge.className = 'discovery';
                badge.textContent = 'НОВЕ!';
                card.appendChild(badge);
                
                document.getElementById('discText').innerHTML = 
                    `Ви створили <b>${alloyName} — ${ELEMENTS[alloyName].n}</b>!<br>` +
                    `Відкрито елементів: ${discoveries.size} з 118`;
                document.getElementById('discLog').classList.add('show');
            }
            
            document.getElementById('resBox').classList.add('show');
        }

        function reset() { clr(1); clr(2); }

        // Запуск
        initGrid();
    </script>
</body>
</html>
